version: '3.8'

services:
  api:
    build: 
      context: ../capstone-taskmanager
      dockerfile: ../capstone-production/Dockerfile
    container_name: taskmanager-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=production
      - DB_PATH=/data/app.db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-me}
      - JWT_EXPIRATION=24h
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - taskmanager-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: taskmanager-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: taskmanager-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: taskmanager-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  taskmanager-data:
  redis-data:
  grafana-data: