{{define "page"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — Altradits</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="nav-mark" style="width:38px;height:38px;font-size:17px;">A</div>
      <span class="auth-logo-name">Altradits</span>
    </div>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your community bank account</p>
    {{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="identifier">Email or phone number</label>
        <input class="form-input" type="text" id="identifier" name="identifier" placeholder="you@email.com or +254..." required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Sign in</button>
    </form>
    <div class="auth-footer">No account? <a href="/register">Open one free &rarr;</a></div>
  </div>
</div>
</body></html>
{{end}}
